name: Build APK — Reel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android arm64 (Reel)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/watchtower-real

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/watchtower-real/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/watchtower-real/android/**/*.gradle*', 'app/watchtower-real/pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Keystore permanent (même clé à chaque build → updates APK fonctionnent) ──
      - name: Restore keystore
        working-directory: app/watchtower-real/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > reel.keystore
            echo "✅ Keystore restauré depuis KEYSTORE_BASE64"
          else
            # Fallback : génère un keystore de dev (ne pas utiliser en prod)
            echo "⚠️  Secret KEYSTORE_BASE64 absent — génère un keystore temporaire"
            echo "   → Les mises à jour APK ne fonctionneront PAS avec ce keystore."
            echo "   → Voir deployment/README.md pour configurer le secret."
            apt-get install -y --no-install-recommends default-jdk-headless > /dev/null 2>&1 || true
            keytool -genkey -v \
              -keystore reel.keystore -alias reel \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storetype PKCS12 \
              -storepass reelwatchtower -keypass reelwatchtower \
              -dname "CN=Reel Dev,O=Watchtower,C=CA"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK — arm64-v8a
        env:
          GRADLE_OPTS:    "-Dorg.gradle.daemon=false -Dhttp.keepAlive=false"
          KEYSTORE_PATH:  "reel.keystore"
          KEY_ALIAS:      "reel"
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD || 'reelwatchtower' }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'reelwatchtower' }}
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          APK="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          [ -f "$APK" ] || { echo "ERROR: APK not found"; ls build/app/outputs/flutter-apk/ || true; exit 1; }
          cp "$APK" "artifacts/reel-arm64-v8a.apk"
          echo "APK: $(du -sh artifacts/reel-arm64-v8a.apk)"

      - uses: actions/upload-artifact@v4
        with:
          name: reel-apk-arm64
          path: app/watchtower-real/artifacts/reel-arm64-v8a.apk
          retention-days: 30
