name: Build IPA — Reel (TrollStore)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: iOS IPA (TrollStore) — Reel
    runs-on: macos-14

    defaults:
      run:
        working-directory: app/watchtower-real

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('app/watchtower-real/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Create iOS project files
        run: flutter create --platforms=ios .

      - name: ATS patch (allow HTTP for local server)
        run: |
          PLIST="ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" "$PLIST" 2>/dev/null || true

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA (TrollStore)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr reel.ipa Payload
          echo "IPA: $(du -sh reel.ipa)"

      - uses: actions/upload-artifact@v4
        with:
          name: reel-ipa-trollstore
          path: app/watchtower-real/reel.ipa
          retention-days: 30
